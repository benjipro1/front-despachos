name: CI/CD Frontend - Despachos (ECS Fargate)

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: innovatech-frontend
  ECS_CLUSTER: innovatech-cluster
  ECS_SERVICE: innovatech-svc-frontend
  CONTAINER_NAME: frontend

jobs:
  build-push-deploy:
    name: Build → Push (ECR) → Deploy (ECS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS (Academy Lab - temporales)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Las URLs de ambos backends se inyectan en tiempo de build.
      # Ambas deben apuntar al MISMO ALB DNS (routing por path /api/v1/...)
      - name: Build y Push imagen Docker a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_DESPACHOS_API_URL=${{ secrets.VITE_DESPACHOS_API_URL }} \
            --build-arg VITE_VENTAS_API_URL=${{ secrets.VITE_VENTAS_API_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Descargar Task Definition actual y limpiar campos no editables
        run: |
          aws ecs describe-task-definition --task-definition $ECR_REPOSITORY \
            --query taskDefinition > task-definition-raw.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition-raw.json > task-definition.json

      - name: Actualizar la imagen en la Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Desplegar nueva Task Definition al ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
