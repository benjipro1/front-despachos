name: CI/CD Frontend - Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Las URLs de ambos backends se inyectan en tiempo de build
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_VENTAS_API_URL=${{ secrets.VITE_VENTAS_API_URL }}
            VITE_DESPACHOS_API_URL=${{ secrets.VITE_DESPACHOS_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despachos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despachos:${{ github.sha }}

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app/frontend
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            docker compose pull frontend
            docker compose up -d --force-recreate frontend
            docker image prune -f
